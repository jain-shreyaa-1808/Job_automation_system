services:
  # Backend API — free tier on Render
  - type: web
    name: jobpilot-api
    runtime: node
    plan: free
    buildCommand: npm install --production
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: AES_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 10000

  # Frontend — free static site on Render
  - type: web
    name: jobpilot-web
    runtime: static
    buildCommand: npm install && npm run build --workspace @job-automation/web
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # set to https://jobpilot-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
